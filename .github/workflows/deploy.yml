name: Deploy RISpro

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rispro-production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rispro
          POSTGRES_PASSWORD: rispro_password
          POSTGRES_DB: rispro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rispro -d rispro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://rispro:rispro_password@localhost:5432/rispro
      JWT_SECRET: deploy-validate-secret
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: npm run check

      - name: Run backend typecheck
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate

      - name: Run scheduling test gate
        run: >
          node --import tsx --test
          src/domain/scheduling/evaluator.test.ts
          src/services/appointment-service.hardening.test.ts
          src/services/appointment-service.integration.test.ts
          src/services/scheduling-settings-service.integration.test.ts

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ vars.DEPLOY_APP_DIR }}"
            BRANCH="${{ vars.DEPLOY_BRANCH }}"

            if [ -z "$APP_DIR" ]; then
              echo "DEPLOY_APP_DIR is not set in GitHub Actions variables."
              exit 1
            fi

            BRANCH="${BRANCH:-main}"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --rebase origin "$BRANCH"
            chmod +x deploy.sh

            SKIP_GIT_PULL=1 \
            APP_DIR="$APP_DIR" \
            DEPLOY_BRANCH="$BRANCH" \
            RESTART_MODE="${{ vars.RESTART_MODE }}" \
            SERVICE_NAME="${{ vars.DEPLOY_SERVICE_NAME }}" \
            PM2_NAME="${{ vars.DEPLOY_PM2_NAME }}" \
            HEALTHCHECK_URL="${{ vars.DEPLOY_HEALTHCHECK_URL }}" \
            BACKUP_CMD="${{ vars.DEPLOY_BACKUP_CMD }}" \
            INSTALL_CMD="${{ vars.DEPLOY_INSTALL_CMD }}" \
            MIGRATE_CMD="${{ vars.DEPLOY_MIGRATE_CMD }}" \
            POST_MIGRATE_CMD="${{ vars.DEPLOY_POST_MIGRATE_CMD }}" \
            ./deploy.sh
