name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-scheduling:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rispro
          POSTGRES_PASSWORD: rispro_password
          POSTGRES_DB: rispro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rispro -d rispro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://rispro:rispro_password@localhost:5432/rispro
      JWT_SECRET: ci-test-secret
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate

      - name: Typecheck backend
        run: npm run typecheck

      - name: Run scheduling test gate
        run: >
          node --import tsx --test
          src/domain/scheduling/evaluator.test.ts
          src/services/appointment-service.hardening.test.ts
          src/services/appointment-service.integration.test.ts
          src/services/scheduling-settings-service.integration.test.ts

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run build -- --mode production
