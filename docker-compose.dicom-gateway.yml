services:
  rispro:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage

  dicom-gateway:
    build:
      context: .
      dockerfile: docker/dicom-gateway/Dockerfile
    depends_on:
      - rispro
    environment:
      RISPRO_BASE_URL: http://rispro:3000
      DICOM_CALLBACK_SECRET: ${DICOM_CALLBACK_SECRET:-change-me-dicom-callback}
      DICOM_BIND_HOST: 0.0.0.0
      DICOM_MWL_AE_TITLE: RISPRO_MWL
      DICOM_MWL_PORT: 11112
      DICOM_MPPS_AE_TITLE: RISPRO_MPPS
      DICOM_MPPS_PORT: 11113
      DICOM_WORKLIST_SOURCE_DIR: /app/storage/dicom/worklist-source
      DICOM_WORKLIST_OUTPUT_DIR: /app/storage/dicom/worklists
      DICOM_MPPS_INBOX_DIR: /app/storage/dicom/mpps/inbox
      DICOM_MPPS_PROCESSED_DIR: /app/storage/dicom/mpps/processed
      DICOM_MPPS_FAILED_DIR: /app/storage/dicom/mpps/failed
    ports:
      - "11112:11112"
      - "11113:11113"
    volumes:
      - ./storage:/app/storage
