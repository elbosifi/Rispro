# =============================================================================
# RISpro Reception - Docker Compose Override (Internal PostgreSQL)
# =============================================================================
# Adds a PostgreSQL service and configures the app to depend on it.
# Use together with the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.internal-db.yml up -d --build
# =============================================================================

services:
  # -----------------------------------------------------------------------
  # RISpro Application - add dependency on internal database
  # -----------------------------------------------------------------------
  app:
    depends_on:
      postgres:
        condition: service_healthy
    # DATABASE_URL is read from .env only (set by setup-docker.sh).
    # Do not construct it here from raw DB_PASSWORD.

  # -----------------------------------------------------------------------
  # PostgreSQL Database (internal)
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rispro-db
    environment:
      POSTGRES_USER: ${DB_USER:-rispro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rispro_password}
      POSTGRES_DB: ${DB_NAME:-rispro}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rispro} -d ${DB_NAME:-rispro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rispro-network

# ---------------------------------------------------------------------------
# Additional Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
