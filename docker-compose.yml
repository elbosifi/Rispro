# =============================================================================
# RISpro Reception - Docker Compose (Base)
# =============================================================================
# This file defines the core RISpro application service.
# It expects DATABASE_URL to be set in the .env file.
#
# For a complete stack with an internal PostgreSQL database, also include
# the override file:
#   docker compose -f docker-compose.yml -f docker-compose.internal-db.yml up -d --build
#
# For an external PostgreSQL database, use this file alone:
#   docker compose up -d --build
# =============================================================================

services:
  # -----------------------------------------------------------------------
  # RISpro Application (embedded DICOM gateway: MWL only)
  # -----------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rispro-app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"   # Web application
      - "11112:11112" # DICOM MWL SCP
    volumes:
      - rispro-storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - rispro-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  rispro-storage:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  rispro-network:
    driver: bridge
